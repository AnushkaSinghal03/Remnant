<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remnant: Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <nav>
        <div class="logo">
            <a href="index.html">
                <img src="./assets/images/logo.png" width="100px" alt="">
            </a>
            <h2>Remnant</h2>
        </div>
        <div class="nav-search">
            <input type="text" class="nav-search-input" placeholder="Find your next read">
            <img src="./assets/images/search_icon.png" class="nav-search-icon" width="25px" alt="">
        </div>
        <button id="theme-toggle">🌙</button>
        <div class="nav-save">
            <a href="/">
                <i class="fa-regular fa-bookmark"></i>
            </a>
        </div>
        <div class="nav-acc">
            <a href="/">
                <i class="fa-regular fa-user"></i>
            </a>
        </div>
    </nav>

    <div class="header">
        <a href="categories.html">
            <p>Categories</p>
        </a>
        <a href="authors.html">
            <p>Authors</p>
        </a>
        <a href="#">
            <p>Language</p>
        </a>
        <a href="contact.html">
            <p>Contact Us</p>
        </a>
    </div>

    <div class="contact-page">
        <h1>Contact Us</h1>
        <form class="contact-form" action="">
            <div class="form-group">
                <label for="contact-name">Name</label>
                <input type="text" id="contact-name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="contact-email">Email</label>
                <input type="email" id="contact-email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="contact-subject">Subject</label>
                <select id="contact-subject" name="subject" required>
                    <option value="" disabled selected>Select a subject</option>
                    <option value="general">General Inquiry</option>
                    <option value="copyright">*Copyright / Takedown Request</option>
                    <option value="book-request">Book Request</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="contact-message">Message</label>
                <textarea id="contact-message" name="message" rows="6" placeholder="Your message..."
                    required></textarea>
            </div>
            <button type="submit" id="contact-submit">Send Message</button>
        </form>
        <p class="contact-note">*For copyright or takedown requests, please include appropriate proof of ownership in
            your message.</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
